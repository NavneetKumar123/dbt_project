version: 2

models:
  - name: bronze_date
    config:
      materialized: view
      schema: bronze

  - name: bronze_sales
    config:
      materialized: view
      schema: bronze


  - name: bronze_product
    config:
      materialized: view

  - name: bronze_sales
    columns:
      - name: sales_id
        data_tests:
          - unique
          - not_null

  - name: bronze_strore
    columns:
      - name: store_sk
        data_tests:
          - unique
          - not_null
      - name: country
        data_tests:
          - accepted_values:
              arguments:
                values: ['USA', 'Canada']
              config:
                severity: warn


        